<p-toast />

<p-dialog 
    [(visible)]="visible"
    (visibleChange)="visibleChange.emit($event)"
    [header]="isEditMode ? 'Editar Bin' : 'Crear Nuevo Bin'"
    [modal]="true"
    [style]="{ width: '40vw' }"
    [breakpoints]="{ '960px': '75vw', '640px': '95vw' }">

    <div class="grid">
        <!-- Código del bin -->
        <div class="col-12 mb-3">
            <label class="block text-surface-900 dark:text-surface-0 font-semibold mb-2">
                Código <span class="text-red-500">*</span>
            </label>
            <input 
                pInputText 
                [(ngModel)]="binData.code" 
                placeholder="Ej: BIN-001"
                class="w-full" />
        </div>

        <!-- Contenido -->
        <div class="col-12 mb-3">
            <label class="block text-surface-900 dark:text-surface-0 font-semibold mb-2">
                Contenido
            </label>
            <input 
                pInputText 
                [(ngModel)]="binData.content" 
                placeholder="Descripción del contenido"
                class="w-full" />
        </div>

        <!-- Cantidad -->
        <div class="col-12 mb-3">
            <label class="block text-surface-900 dark:text-surface-0 font-semibold mb-2">
                Cantidad
            </label>
            <p-inputNumber 
                [(ngModel)]="binData.quantity"
                [min]="0"
                [showButtons]="true"
                placeholder="0"
                styleClass="w-full">
            </p-inputNumber>
        </div>

        <!-- Estado -->
        <div class="col-12 mb-3">
            <label class="block text-surface-900 dark:text-surface-0 font-semibold mb-2">
                Estado <span class="text-red-500">*</span>
            </label>
            <p-dropdown 
                [options]="statusOptions"
                [(ngModel)]="binData.status"
                placeholder="Seleccione estado"
                optionLabel="label"
                optionValue="value"
                styleClass="w-full"
                appendTo="body">
            </p-dropdown>
        </div>

        <!-- Activo -->
        <div class="col-12 mb-3">
            <div class="flex items-center">
                <p-inputSwitch [(ngModel)]="binData.active" styleClass="ml-3"></p-inputSwitch>
                <label class="ml-3 text-surface-900 dark:text-surface-0">
                    {{ binData.active ? 'Activo' : 'Inactivo' }}
                </label>
            </div>
        </div>
    </div>

    <ng-template pTemplate="footer">
        <div class="flex justify-end gap-2">
            <p-button 
                label="Cancelar" 
                (onClick)="closeDialog()"
                [outlined]="true">
            </p-button>
            <p-button 
                [label]="isEditMode ? 'Actualizar' : 'Crear'"
                (onClick)="saveBin()"
                styleClass="p-button-success">
            </p-button>
        </div>
    </ng-template>
</p-dialog>
