<p-toast />

<div class="card">
    <div class="flex items-center mb-6">
        <p-button 
            icon="pi pi-arrow-left" 
            [text]="true"
            [rounded]="true"
            (onClick)="goBack()"
            styleClass="mr-4">
        </p-button>
        <div>
            <h2 class="text-3xl font-bold text-surface-900 dark:text-surface-0 m-0">
                {{ isEditMode ? 'Editar Ubicación' : 'Nueva Ubicación' }}
            </h2>
            <p class="text-surface-600 dark:text-surface-400 mt-2">
                {{ isEditMode ? 'Modifica los detalles de la ubicación' : 'Crea una nueva ubicación en el almacén' }}
            </p>
        </div>
    </div>

    <div class="grid grid-cols-12 gap-6">
        <!-- Información Principal -->
        <div class="col-span-12 lg:col-span-8">
            <p-card header="Información de la Ubicación">
                <div class="grid grid-cols-12 gap-4">
                    <!-- Zone y Category -->
                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Zone
                        </label>
                        <input 
                            pInputText 
                            [(ngModel)]="location.zone" 
                            placeholder="Ingrese la zona"
                            class="w-full" />
                    </div>

                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Category <span class="text-red-500">*</span>
                        </label>
                        <p-dropdown 
                            [options]="categoryOptions"
                            [(ngModel)]="location.category"
                            placeholder="Select category"
                            optionLabel="label"
                            optionValue="value"
                            styleClass="w-full"
                            appendTo="body">
                        </p-dropdown>
                    </div>

                    <!-- Type y Area -->
                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Type <span class="text-red-500">*</span>
                        </label>
                        <p-dropdown 
                            [options]="typeOptions"
                            [(ngModel)]="location.type"
                            (onChange)="onTypeChange()"
                            placeholder="Select type"
                            optionLabel="label"
                            optionValue="value"
                            styleClass="w-full"
                            appendTo="body">
                        </p-dropdown>
                    </div>

                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Area <span class="text-red-500">*</span>
                        </label>
                        <input 
                            pInputText 
                            [(ngModel)]="location.area" 
                            placeholder="Ej: A1"
                            class="w-full" />
                    </div>

                    <!-- Row y Bay -->
                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Row <span class="text-red-500">*</span>
                        </label>
                        <input 
                            pInputText 
                            type="number"
                            [(ngModel)]="location.row"
                            (ngModelChange)="onRowChange()"
                            placeholder="Ingrese row"
                            class="w-full" />
                    </div>

                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Bay <span class="text-red-500">*</span>
                        </label>
                        <input 
                            pInputText 
                            type="number"
                            [(ngModel)]="location.bay"
                            (ngModelChange)="onBayChange()"
                            placeholder="Ingrese bay"
                            class="w-full" />
                    </div>

                    <!-- Level y Custom Name -->
                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Level <span class="text-red-500">*</span>
                        </label>
                        <input 
                            pInputText 
                            type="number"
                            [(ngModel)]="location.level"
                            (ngModelChange)="onLevelChange()"
                            placeholder="Ingrese level"
                            class="w-full" />
                    </div>

                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Custom Name
                        </label>
                        <div class="flex items-center h-[44px]">
                            <p-inputSwitch 
                                [(ngModel)]="location.customName"
                                (onChange)="onCustomNameChange()">
                            </p-inputSwitch>
                            <label class="ml-3">{{ location.customName ? 'Sí' : 'No' }}</label>
                        </div>
                    </div>

                    <!-- Storage Name -->
                    <div class="col-span-12">
                        <label class="block mb-2 font-semibold">
                            Storage Name <span class="text-red-500">*</span>
                        </label>
                        <input 
                            pInputText 
                            [(ngModel)]="location.storageName"
                            [disabled]="!location.customName"
                            placeholder="Enter location name"
                            class="w-full" />
                        <small class="text-surface-600 dark:text-surface-400">
                            {{ location.customName ? 'Ingrese un nombre personalizado' : 'Se genera automáticamente basado en Type-Row-Bay-Level' }}
                        </small>
                    </div>

                    <!-- Content -->
                    <div class="col-span-12">
                        <label class="block mb-2 font-semibold">
                            Content
                        </label>
                        <input 
                            pInputText 
                            [(ngModel)]="location.content" 
                            placeholder="Descripción del contenido"
                            class="w-full" />
                    </div>
                </div>
            </p-card>
        </div>

        <!-- Panel Lateral -->
        <div class="col-span-12 lg:col-span-4">
            <p-card header="Estado">
                <div class="flex items-center">
                    <p-inputSwitch [(ngModel)]="location.active"></p-inputSwitch>
                    <label class="ml-3">
                        {{ location.active ? 'Activa' : 'Inactiva' }}
                    </label>
                </div>
            </p-card>

            <div class="flex flex-col gap-2 mt-4">
                <p-button 
                    [label]="isEditMode ? 'Actualizar Ubicación' : 'Guardar Ubicación'"
                    icon="pi pi-check"
                    (onClick)="saveLocation()"
                    styleClass="w-full"
                    severity="success">
                </p-button>
                <p-button 
                    label="Cancelar" 
                    icon="pi pi-times"
                    (onClick)="goBack()"
                    styleClass="w-full"
                    [outlined]="true">
                </p-button>
            </div>
        </div>
    </div>
</div>
