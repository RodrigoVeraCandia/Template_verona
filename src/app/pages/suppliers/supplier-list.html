<div class="card">
    <div class="flex justify-between items-start mb-4">
        <div>
            <h2 class="text-3xl font-bold text-surface-900 dark:text-surface-0 m-0">Gestión de Proveedores</h2>
        </div>
        <div class="flex gap-3 items-center">
            <p-button 
                label="Nuevo Proveedor" 
                icon="pi pi-plus" 
                (onClick)="createNewSupplier()"
                styleClass="p-button-success">
            </p-button>
            <p-iconfield>
                <p-inputicon styleClass="pi pi-search" />
                <input 
                    pInputText 
                    type="text" 
                    [(ngModel)]="searchValue"
                    (input)="onSearch()"
                    placeholder="Search keyword" 
                    style="width: 250px" />
                <p-inputicon 
                    *ngIf="searchValue" 
                    styleClass="pi pi-times cursor-pointer" 
                    (click)="clearSearch()" />
            </p-iconfield>
        </div>
    </div>

    <p-table 
        [value]="filteredSuppliers" 
        [paginator]="true" 
        [rows]="10"
        [rowsPerPageOptions]="[5, 10, 20]"
        [showCurrentPageReport]="true"
        currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} proveedores"
        styleClass="p-datatable-gridlines">
        
        <ng-template pTemplate="header">
            <tr>
                <th style="width:3rem"></th>
                <th pSortableColumn="name">
                    Nombre <p-sortIcon field="name" />
                </th>
                <th pSortableColumn="contactName">
                    Contacto <p-sortIcon field="contactName" />
                </th>
                <th pSortableColumn="email">
                    Email <p-sortIcon field="email" />
                </th>
                <th pSortableColumn="phone">
                    Teléfono <p-sortIcon field="phone" />
                </th>
                <th pSortableColumn="city">
                    Ciudad <p-sortIcon field="city" />
                </th>
                <th pSortableColumn="country">
                    País <p-sortIcon field="country" />
                </th>
                <th pSortableColumn="active">
                    Estado <p-sortIcon field="active" />
                </th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-supplier>
            <tr>
                <td>
                    <p-button 
                        icon="pi pi-ellipsis-v" 
                        [text]="true" 
                        [rounded]="true" 
                        size="small"
                        (onClick)="menu.toggle($event); menuItems = getMenuItems(supplier)">
                    </p-button>
                </td>
                <td>
                    <span class="font-semibold">{{ supplier.name }}</span>
                </td>
                <td>{{ supplier.contactName }}</td>
                <td>
                    <a [href]="'mailto:' + supplier.email" class="text-primary hover:underline">
                        {{ supplier.email }}
                    </a>
                </td>
                <td>{{ supplier.phone }}</td>
                <td>{{ supplier.city }}</td>
                <td>{{ supplier.country }}</td>
                <td>
                    <p-tag 
                        [value]="getStatusLabel(supplier.active || false)" 
                        [severity]="getStatusSeverity(supplier.active || false)">
                    </p-tag>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="8" class="text-center py-8">
                    <div class="flex flex-col items-center gap-3">
                        <i class="pi pi-inbox text-4xl text-gray-400"></i>
                        <p class="text-gray-500">No se encontraron proveedores</p>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<p-menu #menu [model]="menuItems" [popup]="true" appendTo="body"></p-menu>
<p-confirmDialog />
<p-toast />
