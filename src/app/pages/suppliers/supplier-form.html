<div class="card">
    <div class="flex items-center mb-6">
        <p-button 
            icon="pi pi-arrow-left" 
            [text]="true"
            [rounded]="true"
            (onClick)="goBack()"
            styleClass="mr-4">
        </p-button>
        <div>
            <h2 class="text-3xl font-bold text-surface-900 dark:text-surface-0 m-0">
                {{ isEditMode ? 'Editar Proveedor' : 'Nuevo Proveedor' }}
            </h2>
            <p class="text-surface-600 dark:text-surface-400 mt-2">
                {{ isEditMode ? 'Modifica los detalles del proveedor' : 'Crea un nuevo proveedor para tus productos' }}
            </p>
        </div>
    </div>

    <form (ngSubmit)="onSubmit()" #supplierForm="ngForm">
        <div class="grid grid-cols-12 gap-6">
            <!-- Información Principal -->
            <div class="col-span-12 lg:col-span-8">
                <p-card header="Información del Proveedor">
                    <div class="grid grid-cols-12 gap-4">
                        <!-- Nombre de la Empresa -->
                        <div class="col-span-12">
                            <label for="name" class="block mb-2 font-semibold">
                                Nombre de la Empresa <span class="text-red-500">*</span>
                            </label>
                            <input 
                                pInputText 
                                id="name" 
                                name="name"
                                [(ngModel)]="supplier.name" 
                                required
                                class="w-full"
                                placeholder="Ej: Tech Solutions Inc." />
                        </div>

                        <!-- Nombre del Contacto -->
                        <div class="col-span-12 md:col-span-6">
                            <label for="contactName" class="block mb-2 font-semibold">
                                Nombre del Contacto <span class="text-red-500">*</span>
                            </label>
                            <input 
                                pInputText 
                                id="contactName" 
                                name="contactName"
                                [(ngModel)]="supplier.contactName" 
                                required
                                class="w-full"
                                placeholder="Ej: Juan Pérez" />
                        </div>

                        <!-- Email -->
                        <div class="col-span-12 md:col-span-6">
                            <label for="email" class="block mb-2 font-semibold">
                                Email <span class="text-red-500">*</span>
                            </label>
                            <input 
                                pInputText 
                                id="email" 
                                name="email"
                                type="email"
                                [(ngModel)]="supplier.email" 
                                required
                                class="w-full"
                                placeholder="contacto@empresa.com" />
                        </div>

                        <!-- Teléfono -->
                        <div class="col-span-12 md:col-span-6">
                            <label for="phone" class="block mb-2 font-semibold">
                                Teléfono <span class="text-red-500">*</span>
                            </label>
                            <input 
                                pInputText 
                                id="phone" 
                                name="phone"
                                [(ngModel)]="supplier.phone" 
                                required
                                class="w-full"
                                placeholder="+1 234 567 8900" />
                        </div>

                        <!-- Sitio Web -->
                        <div class="col-span-12 md:col-span-6">
                            <label for="website" class="block mb-2 font-semibold">
                                Sitio Web
                            </label>
                            <input 
                                pInputText 
                                id="website" 
                                name="website"
                                [(ngModel)]="supplier.website" 
                                class="w-full"
                                placeholder="www.empresa.com" />
                        </div>

                        <!-- Dirección -->
                        <div class="col-span-12">
                            <label for="address" class="block mb-2 font-semibold">
                                Dirección
                            </label>
                            <input 
                                pInputText 
                                id="address" 
                                name="address"
                                [(ngModel)]="supplier.address" 
                                class="w-full"
                                placeholder="Calle Principal 123" />
                        </div>

                        <!-- Ciudad -->
                        <div class="col-span-12 md:col-span-6">
                            <label for="city" class="block mb-2 font-semibold">
                                Ciudad
                            </label>
                            <input 
                                pInputText 
                                id="city" 
                                name="city"
                                [(ngModel)]="supplier.city" 
                                class="w-full"
                                placeholder="Ciudad" />
                        </div>

                        <!-- País -->
                        <div class="col-span-12 md:col-span-6">
                            <label for="country" class="block mb-2 font-semibold">
                                País
                            </label>
                            <input 
                                pInputText 
                                id="country" 
                                name="country"
                                [(ngModel)]="supplier.country" 
                                class="w-full"
                                placeholder="País" />
                        </div>
                    </div>
                </p-card>
            </div>

            <!-- Panel Lateral -->
            <div class="col-span-12 lg:col-span-4">
                <p-card header="Estado">
                    <div class="flex items-center">
                        <p-checkbox 
                            [(ngModel)]="supplier.active" 
                            [binary]="true"
                            inputId="active"
                            name="active">
                        </p-checkbox>
                        <label for="active" class="ml-3 cursor-pointer">
                            Proveedor Activo
                        </label>
                    </div>
                </p-card>

                <div class="flex flex-col gap-2 mt-4">
                    <p-button 
                        type="submit"
                        [label]="isEditMode ? 'Actualizar Proveedor' : 'Guardar Proveedor'"
                        icon="pi pi-check"
                        styleClass="w-full"
                        severity="success">
                    </p-button>
                    <p-button 
                        type="button"
                        label="Cancelar" 
                        icon="pi pi-times"
                        (onClick)="goBack()"
                        styleClass="w-full"
                        [outlined]="true">
                    </p-button>
                </div>
            </div>
        </div>
    </form>
</div>

<p-toast />
